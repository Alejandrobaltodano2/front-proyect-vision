<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar sesión — Sistema de Evaluación</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body>

<div id="app">
  <div id="sidebar"></div>
  <div id="main">

    <div class="auth-wrap">
      <div class="card auth-card">
        <div class="card-hdr">
          <div class="dot"></div>
          <span class="title">Iniciar sesión</span>
        </div>
        <div class="card-body">

          <form id="form-login" novalidate>

            <label class="auth-label" for="login-username">Usuario</label>
            <input
              class="auth-input"
              type="text"
              id="login-username"
              name="username"
              autocomplete="username"
              required
            />

            <label class="auth-label" for="login-password">Contraseña</label>
            <input
              class="auth-input"
              type="password"
              id="login-password"
              name="password"
              autocomplete="current-password"
              required
            />

            <div id="login-mensaje" class="auth-mensaje" style="display:none;"></div>

            <button type="submit" id="btn-login" class="btn btn-primary btn-full auth-btn">
              Ingresar
            </button>

          </form>

          <p class="auth-link">
            ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
          </p>

        </div>
      </div>
    </div>

  </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
