<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registrarse — Sistema de Evaluación</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body>

<div id="app">
  <div id="sidebar"></div>
  <div id="main">

    <div class="auth-wrap">
      <div class="card auth-card">
        <div class="card-hdr">
          <div class="dot"></div>
          <span class="title">Crear cuenta</span>
        </div>
        <div class="card-body">

          <form id="form-registro" novalidate>

            <label class="auth-label" for="reg-username">Usuario *</label>
            <input class="auth-input" type="text" id="reg-username" name="username"
                   autocomplete="username" required/>

            <label class="auth-label" for="reg-password">Contraseña *</label>
            <input class="auth-input" type="password" id="reg-password" name="password"
                   autocomplete="new-password" required/>

            <label class="auth-label" for="reg-nombres">Nombres</label>
            <input class="auth-input" type="text" id="reg-nombres" name="nombres"
                   autocomplete="given-name"/>

            <label class="auth-label" for="reg-apellidos">Apellidos</label>
            <input class="auth-input" type="text" id="reg-apellidos" name="apellidos"
                   autocomplete="family-name"/>

            <label class="auth-label" for="reg-carrera">Carrera</label>
            <input class="auth-input" type="text" id="reg-carrera" name="carrera"/>

            <div id="registro-mensaje" class="auth-mensaje" style="display:none;"></div>

            <button type="submit" id="btn-registro" class="btn btn-primary btn-full auth-btn">
              Registrarme
            </button>

          </form>

          <p class="auth-link">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
          </p>

        </div>
      </div>
    </div>

  </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
